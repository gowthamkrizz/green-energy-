<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Energy Access Portal</title>
  <link rel="stylesheet" href="style.css">
  <script src="auth-check.js"></script>
</head>
<body class="auth-page">

  <!-- Background Video and Energy Canvas fallback -->
  <div class="video-bg-container">
    <video autoplay loop muted playsinline poster=".//src/assets/photo-1509391366360-2e959784a276.webp">
      <source src="https://assets.mixkit.co/videos/preview/mixkit-wind-turbines-spinning-under-a-blue-sky-41617-large.mp4" type="video/mp4">
    </video>
    <div class="video-overlay"></div>
    <canvas id="energy-canvas"></canvas>
  </div>

  <!-- Login Card container -->
  <main class="auth-card glass float-anim">
    
    <!-- Logo & Brand Header -->
    <header class="brand-header">
      
      <img src="./src/assets/stackly_logo_-removebg-preview.webp" alt="Stackly Logo" class="brand-logo">
    </header>

    <h2 class="auth-title">Grid Portal Login</h2>
    <p class="auth-subtitle">Monitor and optimize your renewable energy generation</p>

    <!-- Sign In Form -->
    <form id="login-form" action="dashboard-overview.html" method="GET">
      
      <!-- System Role Field -->
      <div class="form-group">
        <label for="role" class="form-label">System Role</label>
        <div class="input-wrapper">
          <select id="role" class="form-input" required style="padding-left: 44px; appearance: none; -webkit-appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 fill=%22%239ca3af%22><path d=%22M6 8L1 3h10z%22/></svg>'); background-repeat: no-repeat; background-position: right 14px center;">
            <option value="" disabled selected hidden>Select Role...</option>
            <option value="user">User / Consumer Node</option>
            <option value="admin">Admin / Grid Operator</option>
          </select>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Grid Identifier / Email</label>
        <div class="input-wrapper">
          <input type="email" id="email" class="form-input" placeholder="e.g. gowtham123@stackly.io" required autocomplete="off" pattern="^[a-zA-Z]+[0-9]*@[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$" title="Email must follow standard format, starting with letters followed only by numbers (e.g. user123@domain.com). Numbers-first emails like 123user are not accepted.">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Access Keys / Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" class="form-input" placeholder="••••••••••••" required autocomplete="new-password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
      </div>

      <div class="form-actions">
        <label class="remember-me">
          <input type="checkbox" class="checkbox-custom">
          Remember Terminal
        </label>
        <a href="404.html" class="forgot-link">Lost Credentials?</a>
      </div>

      <button type="submit" class="btn btn-primary">
        Initialize Connection
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </form>

    <div class="divider">Or Connect Via</div>

    <!-- Social Logins linking to 404 Error page -->
    <div class="social-buttons">
      <!-- Google SVG Icon -->
      <a href="404.html" class="btn-social" aria-label="Connect Google Account">
        <svg viewBox="0 0 24 24">
          <path d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.859-3.578-7.859-8s3.53-8 7.859-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955 2.192 15.34 1 12.24 1 5.92 1 1 5.92 1 12s4.92 11 11.24 11c6.59 0 11-4.636 11-11.182 0-.755-.082-1.332-.18-1.533H12.24z"/>
        </svg>
      </a>
      <!-- GitHub SVG Icon -->
      <a href="404.html" class="btn-social" aria-label="Connect GitHub Account">
        <svg viewBox="0 0 24 24">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
      </a>
      <!-- Apple SVG Icon -->
      <a href="404.html" class="btn-social" aria-label="Connect Apple Account">
        <svg viewBox="0 0 24 24">
          <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.22.67-2.94 1.51-.63.73-1.18 1.87-1.03 2.97 1.12.09 2.27-.56 2.98-1.42z"/>
        </svg>
      </a>
    </div>

    <!-- Auth Navigation footer -->
    <footer class="auth-footer">
      New grid node? <a href="signup.html" class="auth-link">Register Core</a>
    </footer>

  </main>

  <script>
  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const role = document.getElementById('role').value;
    
    // Strict letter-first validation (letters then optional numbers before @)
    const emailRegex = /^[a-zA-Z]+[0-9]*@[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/;
    if (!emailRegex.test(email)) {
      alert("Invalid email format. Email must follow standard format, starting with letters followed only by numbers (e.g., user123@domain.com). Numbers-first emails like 123user are not accepted.");
      return;
    }
    
    // Retrieve registered users from local storage
    let users = JSON.parse(localStorage.getItem('stackly-registered-users') || '[]');
    
    // Seed default credentials if empty
    if (users.length === 0) {
      users = [
        {
          name: "Grid Admin",
          email: "admin@stackly.io",
          password: "admin123",
          role: "admin"
        },
        {
          name: "Gowtham",
          email: "gowtham123@stackly.io",
          password: "user123",
          role: "user"
        }
      ];
      localStorage.setItem('stackly-registered-users', JSON.stringify(users));
    }
    
    // Validate credentials
    const matchedUser = users.find(u => u.email.toLowerCase() === email.toLowerCase());
    if (!matchedUser) {
      alert("Access Denied: This email identifier is not registered.");
      return;
    }
    
    if (matchedUser.password !== password) {
      alert("Access Denied: Invalid security key/password.");
      return;
    }
    
    if (matchedUser.role !== role) {
      alert("Access Denied: Selected system role does not match registered grid role.");
      return;
    }
    
    // Save session credentials
    localStorage.setItem('stackly-email', matchedUser.email);
    localStorage.setItem('stackly-role', matchedUser.role);
    localStorage.setItem('stackly-name', matchedUser.name);
    
    // Dynamically route based on role selection
    if (matchedUser.role === 'admin') {
      window.location.href = 'dashboard-admin-overview.html';
    } else {
      window.location.href = 'dashboard-overview.html';
    }
  });

  // Real-time email input filtering (starts with letters, then optional numbers only)
  document.getElementById('email').addEventListener('input', function() {
    let val = this.value;
    let parts = val.split('@');
    let local = parts[0];
    
    // Extract letters at starting only
    let match = local.match(/^[a-zA-Z]+/);
    let letters = match ? match[0] : '';
    
    let sanitizedLocal = '';
    if (letters.length > 0) {
      let rest = local.substring(letters.length);
      let numbersMatch = rest.match(/^[0-9]*/);
      let numbers = numbersMatch ? numbersMatch[0] : '';
      sanitizedLocal = letters + numbers;
    }
    
    if (parts.length > 1) {
      let domain = parts.slice(1).join('@');
      let sanitizedDomain = domain.replace(/[^a-zA-Z0-9.-]/g, '');
      this.value = sanitizedLocal + '@' + sanitizedDomain;
    } else {
      this.value = sanitizedLocal;
    }
  });
</script>
</body>
</html>
